name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Weekly scan (adjust if you want)
    - cron: "27 22 * * 0"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # For this repo: CodeQL is configured to analyze PHP sources; Twig templates are not explicitly covered here.
        language: [ "php" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optional: if your repo needs a specific PHP version for dependency install/build,
      # set it here (CodeQL can still run without installing deps, but this helps).
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use the standard security+quality query suite
          queries: security-and-quality

      # PHP is usually "autobuild"; this step will try to detect build steps.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # If autobuild doesn't do anything for your Symfony/PHP app, uncomment this
      # and adjust to your needs:
      #
      # - name: Install dependencies (Composer)
      #   run: composer install --no-interaction --no-progress --prefer-dist

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
